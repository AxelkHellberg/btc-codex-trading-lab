services:
  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      HOME: /root
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/trader
      REDIS_URL: redis://redis:6379
    ports:
      - "${APP_PORT:-3300}:${APP_PORT:-3300}"
    restart: unless-stopped
    volumes:
      - ${HOME}/.codex:/root/.codex

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: trader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trader"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
